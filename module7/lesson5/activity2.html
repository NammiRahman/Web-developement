<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>JavaScript Odd-Even</h2>
        <p id="result"></p>
        <script>
            function oddEven (num) {
                if (num% 2==0) {
                    return"Even";
                }
                else {
                    return "odd";
                }
            }
            document.getElementById("result").innerHTML=oddEven(24);
        </script>
    </body>
</html>
