<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h1>JavaScript Function</h1>
        <p id="num1"></p>
        <p id="num2"></p>
        <p id="result"></p>
        <script>
            function add(num1,num2){
                return num1+num2;
            }
            var num1=10;
            document.getElementById("num1").innerHTML="The first number is "+num1;
            var num2 = 20;
                document.getElementById("num2").innerHTML = "The second number is " + num2;
                var result=add(num1,num2);
                document.getElementById("result").innerHTML="The result of adding the two number is "+result;
            
        </script>
    </body>
</html>
